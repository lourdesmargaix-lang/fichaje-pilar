<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <!-- iOS App Configuration -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fichaje Pilar">
  
  <title>🥖 Fichaje - Horno Pastelería El Pilar</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
    
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      box-sizing: border-box;
    }
    
    :root {
      --color-entrada: #00C853;
      --color-entrada-dark: #00A344;
      --color-salida: #FF1744;
      --color-salida-dark: #D50000;
      --color-primary: #FF6B35;
      --color-secondary: #F7931E;
      --color-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --color-card: #ffffff;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      background-attachment: fixed;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }
    
    #app {
      min-height: 100%;
      padding: 20px;
      padding-bottom: 40px;
    }
    
    /* HEADER LLAMATIVO */
    .header {
      text-align: center;
      margin-bottom: 20px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .header-icon {
      font-size: 60px;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .header h1 {
      font-size: 26px;
      font-weight: 800;
      margin: 0;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .header p {
      font-size: 14px;
      margin: 8px 0 0;
      opacity: 0.9;
      font-weight: 600;
    }
    
    /* CARD PRINCIPAL */
    .card {
      background: var(--color-card);
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 420px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
    }
    
    /* SELECTOR DE TRABAJADOR */
    .worker-section {
      margin-bottom: 25px;
    }
    
    .worker-label {
      font-size: 13px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: block;
    }
    
    .select-wrapper {
      position: relative;
    }
    
    select {
      width: 100%;
      padding: 18px 50px 18px 20px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 16px;
      border: 3px solid #e0e0e0;
      -webkit-appearance: none;
      appearance: none;
      background: white;
      color: #333;
      cursor: pointer;
      outline: none;
      transition: all 0.3s;
    }
    
    select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px rgba(255,107,53,0.2);
    }
    
    .select-wrapper::after {
      content: "▼";
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-primary);
      font-size: 14px;
      pointer-events: none;
      font-weight: 700;
    }
    
    /* BOTONES PRINCIPALES ESPECTACULARES */
    .buttons-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .btn-fichar {
      padding: 28px 15px;
      font-size: 20px;
      font-weight: 800;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      text-align: center;
      color: white;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .btn-fichar::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    
    .btn-fichar:active {
      transform: scale(0.95);
    }
    
    .btn-fichar:active::before {
      left: 100%;
    }
    
    .btn-entrada {
      background: linear-gradient(135deg, var(--color-entrada) 0%, var(--color-entrada-dark) 100%);
      box-shadow: 0 10px 30px rgba(0,200,83,0.4);
    }
    
    .btn-salida {
      background: linear-gradient(135deg, var(--color-salida) 0%, var(--color-salida-dark) 100%);
      box-shadow: 0 10px 30px rgba(255,23,68,0.4);
    }
    
    .btn-icon {
      font-size: 40px;
      margin-bottom: 8px;
      display: block;
    }
    
    .btn-text {
      font-size: 16px;
    }
    
    /* MENSAJE DE CONFIRMACIÓN */
    .message-area {
      margin: 20px 0;
      min-height: 70px;
    }
    
    .message {
      padding: 18px;
      border-radius: 16px;
      font-size: 16px;
      text-align: center;
      font-weight: 700;
      animation: slideDown 0.4s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    .message-success {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      color: #155724;
      border: 2px solid #28a745;
    }
    
    .message-error {
      background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
      color: #721c24;
      border: 2px solid #dc3545;
    }
    
    .worker-name {
      font-size: 24px;
      font-weight: 800;
      display: block;
      margin: 8px 0;
      text-transform: uppercase;
    }
    
    /* BOTONES SECUNDARIOS */
    .secondary-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    
    .btn-secondary {
      padding: 16px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    
    .btn-secondary:active {
      transform: scale(0.95);
    }
    
    .btn-excel {
      background: linear-gradient(135deg, #217346 0%, #1e6b3f 100%);
    }
    
    .btn-email {
      background: linear-gradient(135deg, #EA4335 0%, #c53929 100%);
    }
    
    .btn-delete {
      background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
      grid-column: 1 / -1;
    }
    
    /* HISTORIAL */
    .history-section {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 3px dashed #e0e0e0;
    }
    
    .history-title {
      font-size: 14px;
      font-weight: 800;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .history-list {
      max-height: 300px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .record {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 12px;
      border-left: 6px solid;
      animation: slideIn 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .record-entrada {
      border-left-color: var(--color-entrada);
    }
    
    .record-salida {
      border-left-color: var(--color-salida);
      background: linear-gradient(135deg, #fff5f5 0%, #ffe0e0 100%);
    }
    
    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .record-name {
      font-size: 20px;
      font-weight: 800;
      color: #333;
      text-transform: uppercase;
    }
    
    .record-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
      color: white;
      text-transform: uppercase;
    }
    
    .badge-entrada {
      background: var(--color-entrada);
    }
    
    .badge-salida {
      background: var(--color-salida);
    }
    
    .record-time {
      font-size: 14px;
      color: #666;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .empty-state-icon {
      font-size: 50px;
      margin-bottom: 10px;
      opacity: 0.5;
    }
    
    /* STATS */
    .stats-bar {
      display: flex;
      justify-content: space-around;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 20px;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--color-primary);
    }
    
    .stat-label {
      font-size: 11px;
      color: #666;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    /* EMAIL MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .modal {
      background: white;
      border-radius: 24px;
      padding: 25px;
      max-width: 400px;
      width: 100%;
      animation: modalPop 0.3s ease;
    }
    
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .modal-input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 15px;
      font-family: inherit;
    }
    
    .modal-buttons {
      display: flex;
      gap: 10px;
    }
    
    .modal-btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    
    .modal-btn-primary {
      background: var(--color-primary);
      color: white;
    }
    
    .modal-btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
  </style>
</head>
<body>

  <div id="app">
    <!-- HEADER -->
    <div class="header">
      <div class="header-icon">🥖</div>
      <h1>Horno Pastelería<br>El Pilar</h1>
      <p>Sistema de Fichaje</p>
    </div>
    
    <!-- CARD PRINCIPAL -->
    <div class="card">
      <!-- STATS -->
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-number" id="statEntradas">0</div>
          <div class="stat-label">Entradas</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="statSalidas">0</div>
          <div class="stat-label">Salidas</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="statTotal">0</div>
          <div class="stat-label">Total</div>
        </div>
      </div>
      
      <!-- SELECTOR -->
      <div class="worker-section">
        <label class="worker-label">👤 Selecciona Trabajador</label>
        <div class="select-wrapper">
          <select id="trabajador">
            <option value="">-- Elige un trabajador --</option>
            <option value="JIULIA">🔥 JIULIA</option>
            <option value="REMUS">🔥 REMUS</option>
            <option value="LOURDES">🔥 LOURDES</option>
            <option value="ANDREEA">🔥 ANDREEA</option>
            <option value="SANDRA">🔥 SANDRA</option>
          </select>
        </div>
      </div>
      
      <!-- BOTONES PRINCIPALES -->
      <div class="buttons-grid">
        <button class="btn-fichar btn-entrada" id="btnEntrada" type="button">
          <span class="btn-icon">✅</span>
          <span class="btn-text">ENTRADA</span>
        </button>
        
        <button class="btn-fichar btn-salida" id="btnSalida" type="button">
          <span class="btn-icon">⛔</span>
          <span class="btn-text">SALIDA</span>
        </button>
      </div>
      
      <!-- MENSAJE -->
      <div class="message-area" id="messageArea"></div>
      
      <!-- BOTONES SECUNDARIOS -->
      <div class="secondary-buttons">
        <button class="btn-secondary btn-excel" id="btnExcel" type="button">
          📊 Descargar Excel
        </button>
        <button class="btn-secondary btn-email" id="btnEmail" type="button">
          📧 Enviar por Email
        </button>
        <button class="btn-secondary btn-delete" id="btnDelete" type="button">
          🗑️ Borrar Todos los Registros
        </button>
      </div>
      
      <!-- HISTORIAL -->
      <div class="history-section">
        <div class="history-title">
          📋 Registros de Hoy
        </div>
        <div class="history-list" id="historyList">
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div>No hay registros todavía</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- MODAL PARA EMAIL -->
  <div class="modal-overlay" id="emailModal">
    <div class="modal">
      <div class="modal-title">📧 Enviar registros por email</div>
      <p style="color: #666; font-size: 14px; margin-bottom: 15px;">
        Se enviará a: <strong>lourdesmargaix@gmail.com</strong>
      </p>
      <input type="text" class="modal-input" id="emailSubject" placeholder="Asunto del email" value="Fichajes Horno El Pilar">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-secondary" id="btnCancelEmail">Cancelar</button>
        <button class="modal-btn modal-btn-primary" id="btnSendEmail">📨 Enviar</button>
      </div>
    </div>
  </div>

<script>
(function(){
  'use strict';
  
  const STORAGE_KEY = 'fichajes_pilar_2024';
  const EMAIL_DESTINO = 'lourdesmargaix@gmail.com';
  let registros = [];
  const $ = id => document.getElementById(id);
  
  // ===== INICIALIZACIÓN =====
  function init() {
    cargarRegistros();
    actualizarUI();
    setupEventListeners();
  }
  
  // ===== ALMACENAMIENTO =====
  function puedeGuardar() {
    try {
      const test = '__test_' + Date.now();
      localStorage.setItem(test, '1');
      localStorage.removeItem(test);
      return true;
    } catch(e) {
      return false;
    }
  }
  
  const guardadoOK = puedeGuardar();
  
  function cargarRegistros() {
    if (!guardadoOK) return;
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      registros = data ? JSON.parse(data) : [];
    } catch(e) {
      registros = [];
    }
  }
  
  function guardarRegistros() {
    if (!guardadoOK) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(registros));
    } catch(e) {
      mostrarError('Error al guardar datos');
    }
  }
  
  // ===== UI Y MENSAJES =====
  function mostrarExito(trabajador, tipo, hora) {
    const area = $('messageArea');
    const esEntrada = tipo === 'ENTRADA';
    const emoji = esEntrada ? '✅' : '⛔';
    const colorClass = esEntrada ? 'message-success' : 'message-success';
    
    area.innerHTML = `
      <div class="message ${colorClass}">
        <div style="font-size: 30px; margin-bottom: 5px;">${emoji}</div>
        <div style="font-size: 14px; opacity: 0.9;">REGISTRADO</div>
        <div class="worker-name" style="color: ${esEntrada ? '#00C853' : '#FF1744'};">${trabajador}</div>
        <div style="font-size: 18px; font-weight: 700;">${tipo}</div>
        <div style="font-size: 14px; margin-top: 5px; opacity: 0.8;">${hora}</div>
      </div>
    `;
    
    setTimeout(() => area.innerHTML = '', 4000);
  }
  
  function mostrarError(texto) {
    const area = $('messageArea');
    area.innerHTML = `
      <div class="message message-error">
        <div style="font-size: 24px; margin-bottom: 5px;">⚠️</div>
        ${texto}
      </div>
    `;
    setTimeout(() => area.innerHTML = '', 3000);
  }
  
  // ===== FICHAR =====
  function fichar(tipo) {
    const trabajador = $('trabajador').value;
    
    if (!trabajador) {
      mostrarError('Selecciona un trabajador primero');
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      return;
    }

    const ahora = new Date();
    const horaStr = ahora.toLocaleTimeString('es-ES', {
      hour: '2-digit', 
      minute: '2-digit',
      second: '2-digit'
    });
    
    const registro = {
      id: Date.now(),
      trabajador: trabajador,
      tipo: tipo,
      fecha: ahora.toLocaleDateString('es-ES'),
      fechaISO: ahora.toISOString().split('T')[0],
      hora: horaStr,
      timestamp: ahora.getTime()
    };

    registros.unshift(registro);
    guardarRegistros();
    actualizarUI();
    
    mostrarExito(trabajador, tipo, horaStr);
    
    // Feedback táctil
    if (navigator.vibrate) navigator.vibrate(50);
    
    // Reset selector
    setTimeout(() => {
      $('trabajador').value = '';
    }, 1500);
  }
  
  // ===== ACTUALIZAR UI =====
  function actualizarUI() {
    // Stats
    const entradas = registros.filter(r => r.tipo === 'ENTRADA').length;
    const salidas = registros.filter(r => r.tipo === 'SALIDA').length;
    
    $('statEntradas').textContent = entradas;
    $('statSalidas').textContent = salidas;
    $('statTotal').textContent = registros.length;
    
    // Historial
    const list = $('historyList');
    
    if (registros.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <div>No hay registros todavía</div>
        </div>
      `;
      return;
    }
    
    list.innerHTML = registros.slice(0, 20).map(r => {
      const esEntrada = r.tipo === 'ENTRADA';
      const claseRecord = esEntrada ? 'record-entrada' : 'record-salida';
      const claseBadge = esEntrada ? 'badge-entrada' : 'badge-salida';
      const icono = esEntrada ? '✅' : '⛔';
      
      return `
        <div class="record ${claseRecord}">
          <div class="record-header">
            <div class="record-name">${icono} ${r.trabajador}</div>
            <div class="record-badge ${claseBadge}">${r.tipo}</div>
          </div>
          <div class="record-time">📅 ${r.fecha} • 🕐 ${r.hora}</div>
        </div>
      `;
    }).join('');
  }
  
  // ===== EXCEL/CSV =====
  function generarCSV() {
    if (registros.length === 0) {
      mostrarError('No hay registros para exportar');
      return null;
    }
    
    // Encabezados Excel-friendly
    let csv = '\uFEFF'; // BOM para Excel español
    csv += 'ID,TRABAJADOR,TIPO,FECHA,HORA\n';
    
    registros.forEach(r => {
      csv += `${r.id},${r.trabajador},${r.tipo},${r.fecha},${r.hora}\n`;
    });
    
    return csv;
  }
  
  function descargarExcel() {
    const csv = generarCSV();
    if (!csv) return;
    
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    
    const hoy = new Date().toISOString().split('T')[0];
    const nombre = `Fichajes_ElPilar_${hoy}.csv`;
    
    const a = document.createElement('a');
    a.href = url;
    a.download = nombre;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      a.remove();
      URL.revokeObjectURL(url);
    }, 100);
    
    mostrarExito('ARCHIVO', 'DESCARGADO', nombre);
  }
  
  // ===== EMAIL =====
  function abrirModalEmail() {
    if (registros.length === 0) {
      mostrarError('No hay registros para enviar');
      return;
    }
    $('emailModal').style.display = 'flex';
  }
  
  function cerrarModalEmail() {
    $('emailModal').style.display = 'none';
  }
  
  function enviarEmail() {
    const csv = generarCSV();
    if (!csv) return;
    
    const asunto = $('emailSubject').value || 'Fichajes Horno El Pilar';
    const hoy = new Date().toLocaleDateString('es-ES');
    
    // Crear contenido del email
    const cuerpo = `
FICHajes HORNO PASTELERÍA EL PILAR
Fecha: ${hoy}
Total registros: ${registros.length}

RESUMEN:
- Entradas: ${registros.filter(r => r.tipo === 'ENTRADA').length}

  // ===== BORRAR =====
  function borrarTodo() {
    if (registros.length === 0) {
      mostrarError('No hay registros que borrar');
      return;
    }
    
    if (confirm(`¿Borrar PERMANENTEMENTE ${registros.length} registros?`)) {
      // Primero exportar por seguridad
      const csv = generarCSV();
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      
      registros = [];
      guardarRegistros();
      actualizarUI();
      mostrarExito('REGISTROS', 'BORRADOS', 'Se hizo backup automático');
    }
  }
  
  // ===== EVENT LISTENERS =====
  function setupEventListeners() {
    // Botones principales con soporte touch
    const addButtonListener = (id, funcion) => {
      const btn = $(id);
      if (!btn) return;
      
      // Click normal
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        funcion();
      });
      
      // Touch para iOS (más rápido)
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.style.transform = 'scale(0.95)';
        funcion();
      }, {passive: false});
      
      btn.addEventListener('touchend', () => {
        btn.style.transform = '';
      });
    };
    
    addButtonListener('btnEntrada', () => fichar('ENTRADA'));
    addButtonListener('btnSalida', () => fichar('SALIDA'));
    addButtonListener('btnExcel', descargarExcel);
    addButtonListener('btnEmail', abrirModalEmail);
    addButtonListener('btnDelete', borrarTodo);
    
    // Modal
    $('btnCancelEmail').addEventListener('click', cerrarModalEmail);
    $('btnSendEmail').addEventListener('click', enviarEmail);
    
    // Cerrar modal al hacer click fuera
    $('emailModal').addEventListener('click', (e) => {
      if (e.target === $('emailModal')) cerrarModalEmail();
    });
  }
  
  // Iniciar
  init();
